# ─── Production-Grade Docker Compose ─────────────────────────────────────────
# Real-Time Market Data System
#
# Usage:
#   docker compose up -d          # Start all services
#   docker compose logs -f server # Follow server logs
#   docker compose down -v        # Stop and remove volumes
#
# Services:
#   server          - RTMDS gateway (WebSocket + HTTP)
#   redis           - Pub/sub broker
#   postgres        - Event log storage
#   redis-exporter  - Prometheus metrics for Redis
#   postgres-exporter - Prometheus metrics for PostgreSQL
#   prometheus      - Metrics collection
#   grafana         - Dashboard visualization
#
# Ports (host:container):
#   8080 - WebSocket/HTTP gateway
#   9090 - Prometheus
#   3000 - Grafana
#
# Secrets: Stored in ./deployments/secrets/ and injected at runtime.

services:
  # ── Traefik (Reverse Proxy for Zero-Downtime Deployments) ──────────────────
  traefik:
    image: traefik:v3.1
    container_name: rtmds-traefik
    restart: unless-stopped
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entryPoints.web.address=:8080"
    ports:
      - "8080:8080"
      - "8081:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - rtmds-frontend

  # ── RTMDS Gateway ──────────────────────────────────────────────────────────
  server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: local
    image: rtmds:local
    container_name: rtmds-server
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.server.rule=PathPrefix(`/`)"
      - "traefik.http.services.server.loadbalancer.server.port=8080"
    environment:
      RTMDS_SERVER_HOST: "0.0.0.0"
      RTMDS_SERVER_PORT: "8080"
      RTMDS_REDIS_ENABLED: "true"
      RTMDS_REDIS_ADDR: "redis:6379"
      RTMDS_FEED_SYMBOLS: "AAPL,TSLA,MSFT,GOOGL,AMZN"
      RTMDS_LOG_LEVEL: "info"
      RTMDS_LOG_FORMAT: "json"
      RTMDS_METRICS_ENABLED: "true"
      RTMDS_DATABASE_ENABLED: "true"
      RTMDS_DATABASE_HOST: "postgres"
      RTMDS_DATABASE_PORT: "5432"
      RTMDS_DATABASE_USER: "postgres"
      RTMDS_DATABASE_PASSWORD_FILE: "/run/secrets/postgres_password"
      RTMDS_DATABASE_DBNAME: "rtmds"
      RTMDS_DATABASE_SSLMODE: "disable"
      RTMDS_SNAPSHOT_ENABLED: "true"
      RTMDS_SNAPSHOT_CHECKPOINT_PATH: "/data/snapshot.json"
      # GC tuning to prevent OOM kills within the container memory limits
      GOMEMLIMIT: "460MiB"
    secrets:
      - postgres_password
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - rtmds-frontend
      - rtmds-backend
    volumes:
      - server-snapshot:/data
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 128M

  # ── Redis (pub/sub broker) ─────────────────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    container_name: rtmds-redis
    restart: unless-stopped
    ports: []  # Private — only accessible within Docker network
    command: >
      redis-server
        --save ""
        --appendonly no
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        --tcp-backlog 511
        --timeout 0
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - rtmds-backend
    volumes:
      - redis-data:/data
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 64M

  # ── PostgreSQL (event log storage) ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: rtmds-postgres
    restart: unless-stopped
    ports: []  # Private — only accessible within Docker network
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD_FILE: "/run/secrets/postgres_password"
      POSTGRES_DB: rtmds
      # Performance tuning for market data workload
      POSTGRES_INITDB_ARGS: "--data-checksums"
    secrets:
      - postgres_password
    command: >
      postgres
        -c shared_buffers=128MB
        -c effective_cache_size=384MB
        -c work_mem=4MB
        -c maintenance_work_mem=64MB
        -c max_connections=50
        -c wal_buffers=16MB
        -c checkpoint_completion_target=0.9
        -c random_page_cost=1.1
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rtmds"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - rtmds-backend
    volumes:
      - postgres-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M

  # ── Redis Exporter (Prometheus metrics) ────────────────────────────────────
  redis-exporter:
    image: ghcr.io/oliver006/redis_exporter:v1.67.0
    container_name: rtmds-redis-exporter
    restart: unless-stopped
    ports: []  # Private
    environment:
      REDIS_ADDR: "redis://redis:6379"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - rtmds-backend
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          cpus: "0.1"
          memory: 32M

  # ── Postgres Exporter (Prometheus metrics) ─────────────────────────────────
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: rtmds-postgres-exporter
    restart: unless-stopped
    ports: []  # Private
    environment:
      DATA_SOURCE_NAME_FILE: "/run/secrets/pg_exporter_dsn"
    secrets:
      - pg_exporter_dsn
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9187/metrics || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - rtmds-backend
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          cpus: "0.1"
          memory: 32M

  # ── Prometheus (metrics collection) ────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: rtmds-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"  # Expose for external access (optional)
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--storage.tsdb.retention.size=2GB"
      - "--web.enable-lifecycle"
    volumes:
      - ./deployments/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deployments/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - rtmds-backend
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M

  # ── Grafana (dashboard visualization) ──────────────────────────────────────
  grafana:
    image: grafana/grafana:11.2.0
    container_name: rtmds-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD__FILE: "/run/secrets/grafana_password"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "http://localhost:3000"
      GF_INSTALL_PLUGINS: ""
    secrets:
      - grafana_password
    volumes:
      - ./deployments/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - rtmds-frontend
      - rtmds-backend
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  rtmds-frontend:
    driver: bridge
  rtmds-backend:
    driver: bridge

# ── Secrets ───────────────────────────────────────────────────────────────────
secrets:
  postgres_password:
    file: ./deployments/secrets/postgres_password.txt
  grafana_password:
    file: ./deployments/secrets/grafana_password.txt
  pg_exporter_dsn:
    file: ./deployments/secrets/pg_exporter_dsn.txt

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  server-snapshot:
    driver: local
  redis-data:
    driver: local
  postgres-data:
    driver: local
  prometheus-data:
    driver: local
