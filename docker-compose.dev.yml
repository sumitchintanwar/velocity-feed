# Development environment: Redis + PostgreSQL + Go dev container.
#
# Quick start:
#   docker compose -f docker-compose.dev.yml up -d redis postgres
#   docker compose -f docker-compose.dev.yml run --rm dev
#
# Inside the dev container:
#   go test ./internal/distribution/redisbus/ -v
#   go build ./...
#   go run ./cmd/server --config config.yaml

services:
  redis:
    image: redis:7.4-alpine
    container_name: rtmds-redis-dev
    ports:
      - "6379:6379"
    command: redis-server --save "" --appendonly no --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: rtmds-postgres-dev
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rtmds
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rtmds"]
      interval: 5s
      timeout: 3s
      retries: 5

  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: rtmds-dev
    working_dir: /app
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      REDIS_ADDR: "redis:6379"
      RTMDS_REDIS_ADDR: "redis:6379"
      RTMDS_DATABASE_ENABLED: "true"
      RTMDS_DATABASE_HOST: "postgres"
      RTMDS_DATABASE_PORT: "5432"
      RTMDS_DATABASE_USER: "postgres"
      RTMDS_DATABASE_PASSWORD: "postgres"
      RTMDS_DATABASE_DBNAME: "rtmds"
      RTMDS_DATABASE_SSLMODE: "disable"
      POSTGRES_TEST_HOST: "postgres"
      POSTGRES_TEST_PORT: "5432"
      POSTGRES_TEST_USER: "postgres"
      POSTGRES_TEST_PASSWORD: "postgres"
      POSTGRES_TEST_DBNAME: "rtmds"
    stdin_open: true
    tty: true
