# ==============================================================================
# Purpose: HorizontalPodAutoscalers for the production environment.
# Architecture: Dynamically scales replicas based on CPU load.
# Design Decisions: 
# - Gateway scales from 3 to 10 for WebSocket elasticity.
# - Publisher scales from 3 to 10 to handle incoming market data volume spikes.
# ==============================================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: rtmds-gateway-hpa
  namespace: rtmds
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: rtmds-gateway
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70

