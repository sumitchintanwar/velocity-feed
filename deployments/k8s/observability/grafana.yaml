# ==============================================================================
# Purpose: Deploys Grafana for operational dashboards.
# Architecture: Deployment exposed via NodePort or LoadBalancer.
# Design Decisions:
# - Minimal resource requirements for UI rendering.
# - Depends on Prometheus for data source.
# ==============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rtmds-grafana
  namespace: rtmds
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: rtmds
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana
    spec:
      containers:
      - name: grafana
        image: grafana/grafana:10.0.3
        ports:
        - containerPort: 3000
          name: http
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "1Gi"

---
apiVersion: v1
kind: Service
metadata:
  name: rtmds-grafana
  namespace: rtmds
  labels:
    app.kubernetes.io/name: grafana
spec:
  selector:
    app.kubernetes.io/name: grafana
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: ClusterIP
