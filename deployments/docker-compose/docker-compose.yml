version: '3.8'

x-go-service: &go-service
  build:
    context: ../../
    dockerfile: Dockerfile
  environment:
    - ENV=${ENV:-development}
    - LOG_LEVEL=${LOG_LEVEL:-debug}
    - REDIS_URL=redis://redis:6379
    - POSTGRES_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgresql:5432/${POSTGRES_DB}?sslmode=disable
  restart: unless-stopped
  depends_on:
    redis:
      condition: service_healthy
    postgresql:
      condition: service_healthy

services:
  # ==========================================
  # Infrastructure
  # ==========================================
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - rtmds-network

  postgresql:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - rtmds-network

  # ==========================================
  # Observability Stack
  # ==========================================
  prometheus:
    image: prom/prometheus:v2.45.0
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    networks:
      - rtmds-network

  grafana:
    image: grafana/grafana:10.0.3
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    depends_on:
      - prometheus
    networks:
      - rtmds-network

  jaeger:
    image: jaegertracing/all-in-one:1.47
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "${JAEGER_PORT:-16686}:16686"
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
    networks:
      - rtmds-network

  # ==========================================
  # Platform Services
  # ==========================================
  feed-generator:
    <<: *go-service
    command: ["/bin/rtmds", "feed-generator"]
    ports:
      - "${FEED_GEN_PORT:-8082}:8082"
    networks:
      - rtmds-network

  publisher:
    <<: *go-service
    command: ["/bin/rtmds", "publisher"]
    ports:
      - "${PUBLISHER_PORT:-8081}:8081"
    networks:
      - rtmds-network

  topic-manager:
    <<: *go-service
    command: ["/bin/rtmds", "topic-manager"]
    ports:
      - "${TOPIC_MGR_PORT:-8083}:8083"
    networks:
      - rtmds-network

  snapshot-service:
    <<: *go-service
    command: ["/bin/rtmds", "snapshot"]
    ports:
      - "${SNAPSHOT_SVC_PORT:-8085}:8085"
    networks:
      - rtmds-network

  recovery-manager:
    <<: *go-service
    command: ["/bin/rtmds", "recovery"]
    ports:
      - "${RECOVERY_MGR_PORT:-8086}:8086"
    networks:
      - rtmds-network

  replay-api:
    <<: *go-service
    command: ["/bin/rtmds", "replay"]
    ports:
      - "${REPLAY_API_PORT:-8084}:8084"
    networks:
      - rtmds-network

  gateway:
    <<: *go-service
    command: ["/bin/rtmds", "gateway"]
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    depends_on:
      redis:
        condition: service_healthy
      postgresql:
        condition: service_healthy
      topic-manager:
        condition: service_started
    networks:
      - rtmds-network

networks:
  rtmds-network:
    driver: bridge
