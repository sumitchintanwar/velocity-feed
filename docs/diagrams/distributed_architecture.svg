<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 520" width="820" height="520">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="820" height="520" fill="#ffffff"/>

  <!-- Title -->
  <text x="410" y="45" text-anchor="middle" font-family="Inter, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="18" font-weight="600" fill="#1e293b">Distributed Market Data Distribution Architecture</text>

  <!-- Publisher Box -->
  <rect x="310" y="80" width="200" height="56" rx="8" fill="#ffffff" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="410" y="104" text-anchor="middle" font-family="Inter, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="500" fill="#3b82f6">PUBLISHER</text>
  <text x="410" y="122" text-anchor="middle" font-family="Inter, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#64748b">Market Data Ingestion</text>

  <!-- Arrow: Publisher to Redis -->
  <line x1="410" y1="136" x2="410" y2="188" stroke="#475569" stroke-width="1.8" marker-end="url(#arrowhead)"/>

  <!-- Redis Box -->
  <rect x="295" y="195" width="230" height="64" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="2" filter="url(#shadow)"/>
  <text x="335" y="220" font-family="Inter, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="11" font-weight="600" fill="#dc2626">REDIS</text>
  <text x="335" y="238" font-family="Inter, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="11" font-weight="500" fill="#1e293b">Pub/Sub</text>
  <text x="335" y="252" font-family="Inter, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="10" fill="#94a3b8">Message Bus</text>
  <!-- Redis icon placeholder -->
  <rect x="470" y="208" width="36" height="36" rx="6" fill="#dc2626" opacity="0.1"/>
  <text x="488" y="232" text-anchor="middle" font-family="monospace" font-size="14" font-weight="700" fill="#dc2626">R</text>

  <!-- Arrows: Redis to Gateways -->
  <!-- Left arrow -->
  <line x1="370" y1="259" x2="170" y2="348" stroke="#475569" stroke-width="1.8" marker-end="url(#arrowhead)"/>
  <!-- Center arrow -->
  <line x1="410" y1="259" x2="410" y2="348" stroke="#475569" stroke-width="1.8" marker-end="url(#arrowhead)"/>
  <!-- Right arrow -->
  <line x1="450" y1="259" x2="650" y2="348" stroke="#475569" stroke-width="1.8" marker-end="url(#arrowhead)"/>

  <!-- Broadcast label -->
  <rect x="500" y="285" width="80" height="22" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="540" y="300" text-anchor="middle" font-family="Inter, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="10" fill="#64748b">broadcast</text>

  <!-- Gateway 1 -->
  <rect x="70" y="355" width="200" height="56" rx="8" fill="#ffffff" stroke="#10b981" stroke-width="2" filter="url(#shadow)"/>
  <text x="170" y="379" text-anchor="middle" font-family="Inter, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="500" fill="#10b981">GATEWAY-1</text>
  <text x="170" y="397" text-anchor="middle" font-family="Inter, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#64748b">Local Topic Manager</text>

  <!-- Gateway 2 -->
  <rect x="310" y="355" width="200" height="56" rx="8" fill="#ffffff" stroke="#10b981" stroke-width="2" filter="url(#shadow)"/>
  <text x="410" y="379" text-anchor="middle" font-family="Inter, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="500" fill="#10b981">GATEWAY-2</text>
  <text x="410" y="397" text-anchor="middle" font-family="Inter, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#64748b">Local Topic Manager</text>

  <!-- Gateway 3 -->
  <rect x="550" y="355" width="200" height="56" rx="8" fill="#ffffff" stroke="#10b981" stroke-width="2" filter="url(#shadow)"/>
  <text x="650" y="379" text-anchor="middle" font-family="Inter, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="500" fill="#10b981">GATEWAY-3</text>
  <text x="650" y="397" text-anchor="middle" font-family="Inter, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#64748b">Local Topic Manager</text>

  <!-- Arrows: Gateways to Clients -->
  <line x1="170" y1="411" x2="170" y2="448" stroke="#475569" stroke-width="1.2" marker-end="url(#arrowhead)"/>
  <line x1="410" y1="411" x2="410" y2="448" stroke="#475569" stroke-width="1.2" marker-end="url(#arrowhead)"/>
  <line x1="650" y1="411" x2="650" y2="448" stroke="#475569" stroke-width="1.2" marker-end="url(#arrowhead)"/>

  <!-- Client labels -->
  <text x="170" y="466" text-anchor="middle" font-family="Inter, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#94a3b8">WebSocket Clients</text>
  <text x="410" y="466" text-anchor="middle" font-family="Inter, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#94a3b8">WebSocket Clients</text>
  <text x="650" y="466" text-anchor="middle" font-family="Inter, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#94a3b8">WebSocket Clients</text>

  <!-- Legend -->
  <rect x="30" y="485" width="760" height="28" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <circle cx="50" cy="499" r="5" fill="#3b82f6"/>
  <text x="60" y="503" font-family="Inter, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="10" fill="#64748b">Publisher</text>
  <circle cx="140" cy="499" r="5" fill="#dc2626"/>
  <text x="150" y="503" font-family="Inter, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="10" fill="#64748b">Redis Pub/Sub</text>
  <circle cx="260" cy="499" r="5" fill="#10b981"/>
  <text x="270" y="503" font-family="Inter, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="10" fill="#64748b">Gateway Instances</text>
  <line x1="390" y1="499" x2="410" y2="499" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="418" y="503" font-family="Inter, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="10" fill="#64748b">Data Flow</text>
</svg>
