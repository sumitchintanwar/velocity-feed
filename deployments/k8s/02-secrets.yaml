apiVersion: v1
kind: Secret
metadata:
  name: rtmds-secrets
  namespace: rtmds
type: Opaque
stringData:
  # In a real environment, these would be managed by Vault or sealed-secrets, not checked into git.
  postgres_password: "postgres-super-secret"
  redis_password: "redis-super-secret"
  grafana_password: "admin"
  pg_exporter_dsn: "postgresql://postgres:postgres-super-secret@postgres.rtmds.svc.cluster.local:5432/rtmds?sslmode=disable"
