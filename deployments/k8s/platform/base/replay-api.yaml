# ==============================================================================
# Purpose: Deploys the Replay API for retrieving historical market data ticks.
# Architecture: High-memory stateless Deployment.
# Design Decisions:
# - High Memory because it scans and returns huge payloads of historical data.
# - Long termination grace period (60s) to allow large historical query drains.
# ==============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rtmds-replay-api
  namespace: rtmds
  labels:
    app.kubernetes.io/name: replay-api
    app.kubernetes.io/part-of: rtmds
spec:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: replay-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: replay-api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      terminationGracePeriodSeconds: 60
      containers:
      - name: replay-api
        image: rtmds/replay-api:latest
        imagePullPolicy: Always
        command: ["/bin/rtmds", "replay"]
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
        ports:
        - containerPort: 8084
          name: http
        envFrom:
        - configMapRef:
            name: rtmds-config
        - secretRef:
            name: rtmds-redis-credentials
        - secretRef:
            name: rtmds-postgres-credentials
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "1000m"
            memory: "4Gi"
        startupProbe:
          httpGet:
            path: /ready
            port: 8084
          failureThreshold: 30
          periodSeconds: 2
        readinessProbe:
          httpGet:
            path: /ready
            port: 8084
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /live
            port: 8084
          periodSeconds: 10
          failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: rtmds-replay-api
  namespace: rtmds
  labels:
    app.kubernetes.io/name: replay-api
spec:
  selector:
    app.kubernetes.io/name: replay-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8084
  type: ClusterIP
