# RTMDS Nginx Load Balancer — Benchmark Configuration
#
# Optimized for benchmarking: least_conn, faster failover, detailed logging

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format benchmark '$remote_addr - [$time_local] "$request" '
                         '$status $body_bytes_sent '
                         'rtmds_gateway=$upstream_addr '
                         'rtmds_response_time=$upstream_response_time';

    access_log /var/log/nginx/access.log benchmark;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    keepalive_timeout 65;
    keepalive_requests 10000;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    upstream rtmds_gateways {
        least_conn;

        server gateway1:9091 max_fails=2 fail_timeout=10s;
        server gateway2:9092 max_fails=2 fail_timeout=10s;
        server gateway3:9093 max_fails=2 fail_timeout=10s;
        server gateway4:9094 max_fails=2 fail_timeout=10s;
        server gateway5:9095 max_fails=2 fail_timeout=10s;

        keepalive 64;
    }

    server {
        listen 8080;
        server_name localhost;

        location /nginx-health {
            access_log off;
            return 200 '{"status":"ok","service":"nginx"}';
            add_header Content-Type application/json;
        }

        location /ws {
            proxy_pass http://rtmds_gateways;
            proxy_http_version 1.1;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;

            proxy_next_upstream error timeout http_502 http_503;

            proxy_buffering off;
            proxy_cache off;
        }

        location /health {
            proxy_pass http://rtmds_gateways;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            proxy_connect_timeout 3s;
            proxy_read_timeout 3s;

            proxy_next_upstream error timeout http_502 http_503;
            proxy_next_upstream_tries 2;

            proxy_set_header rtmds-gateway-id $upstream_http_rtmds_gateway_id;
            add_header rtmds-gateway-id $upstream_http_rtmds_gateway_id always;
        }

        location /health/detail {
            proxy_pass http://rtmds_gateways;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_connect_timeout 3s;
            proxy_read_timeout 3s;

            proxy_set_header rtmds-gateway-id $upstream_http_rtmds_gateway_id;
            add_header rtmds-gateway-id $upstream_http_rtmds_gateway_id always;
        }

        location /ready {
            proxy_pass http://rtmds_gateways;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_connect_timeout 3s;
            proxy_read_timeout 3s;

            proxy_set_header rtmds-gateway-id $upstream_http_rtmds_gateway_id;
            add_header rtmds-gateway-id $upstream_http_rtmds_gateway_id always;
        }

        location /gateways {
            proxy_pass http://rtmds_gateways;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location /metrics {
            proxy_pass http://gateway1:9091;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location / {
            proxy_pass http://gateway1:9091;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
