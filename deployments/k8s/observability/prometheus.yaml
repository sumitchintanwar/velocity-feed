# ==============================================================================
# Purpose: Deploys Prometheus for scraping metrics from the RTMDS platform.
# Architecture: Deployment with a ConfigMap for scraping rules.
# Design Decisions:
# - Exposed internally via ClusterIP for Grafana to access.
# - Requires a ConfigMap for prometheus.yml to define target discovery.
# ==============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rtmds-prometheus
  namespace: rtmds
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: rtmds
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: prometheus
    spec:
      containers:
      - name: prometheus
        image: prom/prometheus:v2.45.0
        ports:
        - containerPort: 9090
          name: http
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "2Gi"

---
apiVersion: v1
kind: Service
metadata:
  name: rtmds-prometheus
  namespace: rtmds
  labels:
    app.kubernetes.io/name: prometheus
spec:
  selector:
    app.kubernetes.io/name: prometheus
  ports:
    - protocol: TCP
      port: 9090
      targetPort: 9090
  type: ClusterIP
