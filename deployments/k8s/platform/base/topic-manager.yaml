# ==============================================================================
# Purpose: Deploys the Topic Manager service which controls subscription routing rules.
# Architecture: Standard stateless Deployment.
# Design Decisions:
# - Scaling priority is medium. 2 replicas is sufficient for high availability.
# - CPU and Memory requirements are much lower than Publisher and Gateway.
# - Rolling updates guarantee topic state availability during new releases.
# ==============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rtmds-topic-manager
  namespace: rtmds
  labels:
    app.kubernetes.io/name: topic-manager
    app.kubernetes.io/part-of: rtmds
spec:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: topic-manager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: topic-manager
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      terminationGracePeriodSeconds: 30
      containers:
      - name: topic-manager
        image: rtmds/topic-manager:latest
        imagePullPolicy: Always
        command: ["/bin/rtmds", "topic-manager"]
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
        ports:
        - containerPort: 8083
          name: http
        envFrom:
        - configMapRef:
            name: rtmds-config
        - secretRef:
            name: rtmds-redis-credentials
        resources:
          requests:
            cpu: "200m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        startupProbe:
          httpGet:
            path: /ready
            port: 8083
          failureThreshold: 30
          periodSeconds: 2
        readinessProbe:
          httpGet:
            path: /ready
            port: 8083
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /live
            port: 8083
          periodSeconds: 10
          failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: rtmds-topic-manager
  namespace: rtmds
  labels:
    app.kubernetes.io/name: topic-manager
spec:
  selector:
    app.kubernetes.io/name: topic-manager
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8083
  type: ClusterIP
