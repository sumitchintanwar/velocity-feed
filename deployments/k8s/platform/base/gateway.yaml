# ==============================================================================
# Purpose: Deploys the Gateway service which ingests external WebSocket connections.
# Architecture: Scalable Deployment exposed via a ClusterIP (or LoadBalancer in prod).
# Design Decisions:
# - High CPU/Memory limits because it holds thousands of concurrent WebSocket connections.
# - Pod anti-affinity to ensure high availability across physical nodes.
# - Grace period set to 45s to allow the Go Lifecycle Manager to drain WebSockets gracefully.
# - Startup, Liveness, and Readiness probes hit the `/health`, `/live`, and `/ready` HTTP endpoints.
# ==============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rtmds-gateway
  namespace: rtmds
  labels:
    app.kubernetes.io/name: gateway
    app.kubernetes.io/part-of: rtmds
spec:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gateway
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      terminationGracePeriodSeconds: 45
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app.kubernetes.io/name
                  operator: In
                  values:
                  - gateway
              topologyKey: kubernetes.io/hostname
      containers:
      - name: gateway
        image: rtmds/gateway:latest
        imagePullPolicy: Always
        command: ["/bin/rtmds", "gateway"]
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
        ports:
        - containerPort: 8080
          name: http
        envFrom:
        - configMapRef:
            name: rtmds-config
        - secretRef:
            name: rtmds-redis-credentials
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "2000m"
            memory: "2Gi"
        startupProbe:
          httpGet:
            path: /ready
            port: 8080
          failureThreshold: 30
          periodSeconds: 2
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /live
            port: 8080
          periodSeconds: 10
          failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: rtmds-gateway
  namespace: rtmds
  labels:
    app.kubernetes.io/name: gateway
spec:
  selector:
    app.kubernetes.io/name: gateway
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: ClusterIP
