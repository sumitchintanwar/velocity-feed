# ==============================================================================
# Purpose: Deploys the Snapshot Service which returns current order book states.
# Architecture: Moderate-memory stateless Deployment.
# Design Decisions:
# - Scaling priority is medium.
# - CPU and Memory are moderate, largely relying on Redis for fast queries.
# ==============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rtmds-snapshot-service
  namespace: rtmds
  labels:
    app.kubernetes.io/name: snapshot-service
    app.kubernetes.io/part-of: rtmds
spec:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: snapshot-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: snapshot-service
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      terminationGracePeriodSeconds: 30
      containers:
      - name: snapshot-service
        image: rtmds/snapshot-service:latest
        imagePullPolicy: Always
        command: ["/bin/rtmds", "snapshot"]
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
        ports:
        - containerPort: 8085
          name: http
        envFrom:
        - configMapRef:
            name: rtmds-config
        - secretRef:
            name: rtmds-redis-credentials
        - secretRef:
            name: rtmds-postgres-credentials
        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
        startupProbe:
          httpGet:
            path: /ready
            port: 8085
          failureThreshold: 30
          periodSeconds: 2
        readinessProbe:
          httpGet:
            path: /ready
            port: 8085
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /live
            port: 8085
          periodSeconds: 10
          failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: rtmds-snapshot-service
  namespace: rtmds
  labels:
    app.kubernetes.io/name: snapshot-service
spec:
  selector:
    app.kubernetes.io/name: snapshot-service
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8085
  type: ClusterIP
