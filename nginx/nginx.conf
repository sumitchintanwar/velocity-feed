# RTMDS Nginx Load Balancer — Stateless Gateway Routing
#
# Uses least_conn to distribute WebSocket connections across gateways
# based on active connection count. Clients own their subscription state
# (fat client pattern) and re-send subscriptions on reconnect to any gateway.
#
# Architecture:
#   Client → Nginx (least_conn) → Gateway 1/2/3 → Redis → Market Data
#
# Usage:
#   docker compose -f docker-compose.sticky.yml up --build
#
# Test routing:
#   curl -s -D - -o /dev/null http://localhost:8080/health
#   # Check rtmds-gateway-id header — different IPs may hit different gateways

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging format with gateway ID for debugging sticky sessions
    log_format sticky '$remote_addr - [$time_local] "$request" '
                      '$status $body_bytes_sent '
                      '"$http_upgrade" rtmds_gateway=$upstream_addr';

    access_log /var/log/nginx/access.log sticky;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    keepalive_timeout 65;
    keepalive_requests 1000;

    # WebSocket upgrade map
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # Upstream with least_conn — stateless routing
    # Clients own subscription state (fat client pattern) and re-send
    # subscriptions on reconnect, so any gateway can serve any client.
    upstream rtmds_gateways {
        least_conn;

        # max_fails=3: mark backend as failed after 3 consecutive failures
        # fail_timeout=30s: cooldown before retrying a failed backend
        server gateway1:9091 max_fails=3 fail_timeout=30s;
        server gateway2:9092 max_fails=3 fail_timeout=30s;
        server gateway3:9093 max_fails=3 fail_timeout=30s;

        # Keepalive connections to gateways for better performance
        keepalive 32;
    }

    server {
        listen 8080;
        server_name localhost;

        # Health check endpoint (returns nginx status)
        location /nginx-health {
            access_log off;
            return 200 '{"status":"ok","service":"nginx"}';
            add_header Content-Type application/json;
        }

        # WebSocket endpoint
        location /ws {
            proxy_pass http://rtmds_gateways;
            proxy_http_version 1.1;

            # WebSocket upgrade headers
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # Forward client info for gateway logging
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts for long-lived WebSocket connections
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;

            # Retry on next upstream if connection fails during upgrade
            # (only applies to initial connection, not established WebSocket)
            proxy_next_upstream error timeout http_502 http_503;

            # Buffer settings for WebSocket frames
            proxy_buffering off;
            proxy_cache off;
        }

        # Health endpoint - proxy to any gateway
        location /health {
            proxy_pass http://rtmds_gateways;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # Quick timeout for health checks
            proxy_connect_timeout 5s;
            proxy_read_timeout 5s;

            # Retry on next upstream if current fails (gateway crash, timeout)
            proxy_next_upstream error timeout http_502 http_503;
            proxy_next_upstream_tries 2;

            # Pass through gateway ID header for load balancer diagnostics
            proxy_set_header rtmds-gateway-id $upstream_http_rtmds_gateway_id;
            add_header rtmds-gateway-id $upstream_http_rtmds_gateway_id always;
        }

        # Detailed health endpoint
        location /health/detail {
            proxy_pass http://rtmds_gateways;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_connect_timeout 5s;
            proxy_read_timeout 5s;

            # Pass through gateway ID header for load balancer diagnostics
            proxy_set_header rtmds-gateway-id $upstream_http_rtmds_gateway_id;
            add_header rtmds-gateway-id $upstream_http_rtmds_gateway_id always;
        }

        # Readiness endpoint
        location /ready {
            proxy_pass http://rtmds_gateways;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_connect_timeout 5s;
            proxy_read_timeout 5s;

            # Pass through gateway ID header for load balancer diagnostics
            proxy_set_header rtmds-gateway-id $upstream_http_rtmds_gateway_id;
            add_header rtmds-gateway-id $upstream_http_rtmds_gateway_id always;
        }

        # Metrics endpoint - route to gateway1 (primary)
        location /metrics {
            proxy_pass http://gateway1:9091;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # Root page - proxy to gateway1
        location / {
            proxy_pass http://gateway1:9091;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
