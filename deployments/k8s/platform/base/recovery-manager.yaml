# ==============================================================================
# Purpose: Deploys the Recovery Manager which orchestrates gap detection and replay.
# Architecture: Standard stateless Deployment.
# Design Decisions:
# - Moderate resource requirements.
# - High availability guarantees via 2 replicas and rolling updates.
# ==============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rtmds-recovery-manager
  namespace: rtmds
  labels:
    app.kubernetes.io/name: recovery-manager
    app.kubernetes.io/part-of: rtmds
spec:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: recovery-manager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: recovery-manager
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      terminationGracePeriodSeconds: 30
      containers:
      - name: recovery-manager
        image: rtmds/recovery-manager:latest
        imagePullPolicy: Always
        command: ["/bin/rtmds", "recovery"]
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
        ports:
        - containerPort: 8086
          name: http
        envFrom:
        - configMapRef:
            name: rtmds-config
        - secretRef:
            name: rtmds-redis-credentials
        - secretRef:
            name: rtmds-postgres-credentials
        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
        startupProbe:
          httpGet:
            path: /ready
            port: 8086
          failureThreshold: 30
          periodSeconds: 2
        readinessProbe:
          httpGet:
            path: /ready
            port: 8086
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /live
            port: 8086
          periodSeconds: 10
          failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: rtmds-recovery-manager
  namespace: rtmds
  labels:
    app.kubernetes.io/name: recovery-manager
spec:
  selector:
    app.kubernetes.io/name: recovery-manager
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8086
  type: ClusterIP
