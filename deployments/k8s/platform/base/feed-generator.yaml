# ==============================================================================
# Purpose: Deploys the Feed Generator service which simulates live market data.
# Architecture: Stateless Deployment.
# Design Decisions:
# - Low Memory, Moderate CPU.
# - Scaling priority is Medium.
# - Rolling updates with maxSurge 25%.
# ==============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rtmds-feed-generator
  namespace: rtmds
  labels:
    app.kubernetes.io/name: feed-generator
    app.kubernetes.io/part-of: rtmds
spec:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: feed-generator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: feed-generator
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      terminationGracePeriodSeconds: 30
      containers:
      - name: feed-generator
        image: rtmds/feed-generator:latest
        imagePullPolicy: Always
        command: ["/bin/rtmds", "feed-generator"]
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
        ports:
        - containerPort: 8082
          name: http
        envFrom:
        - configMapRef:
            name: rtmds-config
        - secretRef:
            name: rtmds-redis-credentials
        - secretRef:
            name: rtmds-postgres-credentials
        resources:
          requests:
            cpu: "250m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
        startupProbe:
          httpGet:
            path: /ready
            port: 8082
          failureThreshold: 30
          periodSeconds: 2
        readinessProbe:
          httpGet:
            path: /ready
            port: 8082
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /live
            port: 8082
          periodSeconds: 10
          failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: rtmds-feed-generator
  namespace: rtmds
  labels:
    app.kubernetes.io/name: feed-generator
spec:
  selector:
    app.kubernetes.io/name: feed-generator
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8082
  type: ClusterIP
