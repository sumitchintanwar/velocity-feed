version: "3.9"

services:
  # ── Real-Time Market Data Server ───────────────────────────────────────────
  server:
    build:
      context: .
      dockerfile: Dockerfile
    image: rtmds:local
    container_name: rtmds-server
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      RTMDS_SERVER_HOST: "0.0.0.0"
      RTMDS_SERVER_PORT: "8080"
      RTMDS_REDIS_ADDR: "redis:6379"
      RTMDS_FEED_SYMBOLS: "AAPL,TSLA,MSFT,GOOGL,AMZN"
      RTMDS_LOG_LEVEL: "info"
      RTMDS_LOG_FORMAT: "json"
      RTMDS_METRICS_ENABLED: "true"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - rtmds-net

  # ── Redis (pub/sub broker for multi-instance fan-out) ──────────────────────
  redis:
    image: redis:7.4-alpine
    container_name: rtmds-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --save "" --appendonly no --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - rtmds-net
    volumes:
      - redis-data:/data

  # ── Prometheus ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: rtmds-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./deployments/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - server
    networks:
      - rtmds-net

  # ── Grafana ────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.2.0
    container_name: rtmds-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "admin"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./deployments/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - rtmds-net

networks:
  rtmds-net:
    driver: bridge

volumes:
  redis-data:
  grafana-data:
