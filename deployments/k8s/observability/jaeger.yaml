# ==============================================================================
# Purpose: Deploys Jaeger All-In-One for distributed tracing.
# Architecture: Deployment exposing OTLP ports (4317/4318) and UI (16686).
# Design Decisions:
# - Memory intensive because it buffers spans in memory.
# - Used strictly for debugging and latency tracking across microservices.
# ==============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rtmds-jaeger
  namespace: rtmds
  labels:
    app.kubernetes.io/name: jaeger
    app.kubernetes.io/part-of: rtmds
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: jaeger
  template:
    metadata:
      labels:
        app.kubernetes.io/name: jaeger
    spec:
      containers:
      - name: jaeger
        image: jaegertracing/all-in-one:1.47
        env:
        - name: COLLECTOR_OTLP_ENABLED
          value: "true"
        ports:
        - containerPort: 16686
          name: ui
        - containerPort: 4317
          name: otlp-grpc
        - containerPort: 4318
          name: otlp-http
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "2Gi"

---
apiVersion: v1
kind: Service
metadata:
  name: rtmds-jaeger
  namespace: rtmds
  labels:
    app.kubernetes.io/name: jaeger
spec:
  selector:
    app.kubernetes.io/name: jaeger
  ports:
    - name: ui
      protocol: TCP
      port: 16686
      targetPort: 16686
    - name: otlp-grpc
      protocol: TCP
      port: 4317
      targetPort: 4317
    - name: otlp-http
      protocol: TCP
      port: 4318
      targetPort: 4318
  type: ClusterIP
