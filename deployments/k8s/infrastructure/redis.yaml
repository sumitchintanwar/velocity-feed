# ==============================================================================
# Purpose: Deploys Redis for Pub/Sub messaging and high-speed caching.
# Architecture: Standard Deployment (StatefulSet used in prod if persistence enabled).
# Design Decisions:
# - Extremely high CPU and Memory limits because all live data flows through Redis.
# - Liveness probe uses `redis-cli ping` to guarantee responsiveness.
# ==============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rtmds-redis
  namespace: rtmds
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: rtmds
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis
    spec:
      terminationGracePeriodSeconds: 30
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
          name: redis
        resources:
          requests:
            cpu: "1000m"
            memory: "2Gi"
          limits:
            cpu: "4000m"
            memory: "8Gi"
        readinessProbe:
          exec:
            command: ["redis-cli", "ping"]
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          exec:
            command: ["redis-cli", "ping"]
          initialDelaySeconds: 15
          periodSeconds: 15

---
apiVersion: v1
kind: Service
metadata:
  name: rtmds-redis
  namespace: rtmds
  labels:
    app.kubernetes.io/name: redis
spec:
  selector:
    app.kubernetes.io/name: redis
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379
  type: ClusterIP
